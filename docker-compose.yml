services:
  app:
    build: .
    networks:
      br0:
        ipv4_address: ${CONTAINER_IP}
    volumes:
      - /mnt/user/appdata/reselling:/data
      - /mnt/user/data/Documents/GC:/data/files
    environment:
      DATABASE_URL: file:/data/resell.db
    restart: unless-stopped

networks:
  br0:
    external: true
    name: br0
