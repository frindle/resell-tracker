services:
  app:
    build: .
    networks:
      br0:
        ipv4_address: 10.0.x.x  # set to your desired static IP
    volumes:
      - /mnt/user/appdata/reselling:/data
    environment:
      DATABASE_URL: file:/data/resell.db
    restart: unless-stopped

networks:
  br0:
    external: true
    name: br0
